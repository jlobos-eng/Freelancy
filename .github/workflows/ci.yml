name: CI

# Gate de calidad: cada push y cada Pull Request corre lint + tests + build.
# Si algo falla, el PR queda en rojo y no debería mergearse.
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `npm install` (no `npm ci`) porque el lockfile aún no incluye vitest.
      # Cambiar a `npm ci` cuando el lockfile se regenere localmente.
      - name: Install deps
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
